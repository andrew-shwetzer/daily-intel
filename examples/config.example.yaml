# Reality Engine Instance Configuration
# Copy this file and customize for your niche.
#
# Location: ~/.reality-engine/instances/<slug>/config.yaml

instance:
  name: "My Industry"
  slug: my-industry
  created: "2026-01-01"
  niche: "Your Industry Name"
  description: "Monitor industry competitors, news, and content opportunities"

company:
  name: "Your Company"
  url: "https://yourcompany.com"
  blog: "https://yourcompany.com/blog/"
  services:
    - "Service 1"
    - "Service 2"
    - "Service 3"
  differentiator: "What makes you different"

goals:
  primary: "all"  # competitive_intel | content_generation | sales_signals | all
  competitive_intel: true
  content_generation: true
  sales_signals: false

delivery:
  channels:
    - type: slack
      target: "#intel-brief"
    - type: email
      target: "you@yourcompany.com"
  schedule:
    brief_time: "06:00"
    timezone: "America/New_York"
    frequency: "daily"

content:
  channels:
    - linkedin
    - blog
  voice: "authoritative"  # authoritative | conversational | data-driven | contrarian
  formats:
    - text_post
    - carousel
    - blog_article

scoring:
  min_relevance: 6  # out of 10
  priority_thresholds:
    p1_act_today: 75
    p2_this_week: 30
    p3_backlog: 10

# Define signal categories relevant to your niche.
# These become the category values in the signals table.
categories:
  - name: "Industry News"
    description: "Major developments in your industry"
    priority: high
  - name: "Competitor Moves"
    description: "New services, pricing changes, content from competitors"
    priority: high
  - name: "Legal & Regulatory"
    description: "Laws, regulations, compliance changes affecting your industry"
    priority: high
  - name: "Platform Changes"
    description: "Changes to platforms your industry depends on"
    priority: high
  - name: "AI & Technology"
    description: "AI and technology developments relevant to your niche"
    priority: high
  - name: "Content Idea: Trending"
    description: "Trending topic for timely content"
    priority: medium
  - name: "Content Idea: Evergreen"
    description: "SEO-targeted content idea that compounds"
    priority: medium
  - name: "Audience Question / Pain Point"
    description: "Real questions from prospects and communities"
    priority: medium

tools:
  budget: "moderate"  # free | low ($0-50/mo) | moderate ($50-200/mo) | high ($200+/mo)
